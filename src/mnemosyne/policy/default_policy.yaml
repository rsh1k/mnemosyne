# Mnemosyne default policy
# -------------------------
# This declarative policy maps provenance -> trust tier and (surface, tier,
# findings) -> decision. It is intentionally conservative ("secure by default").
# Override by pointing MNEMOSYNE_POLICY_PATH at your own copy.

version: 1

# How each provenance is trusted before any content analysis.
provenance_trust:
  user_direct: trusted
  agent_derived: trusted
  tool_output: limited
  retrieved_doc: limited
  inter_agent: limited
  external_web: untrusted
  untrusted_file: untrusted
  unknown: untrusted

# The cardinal ASI06 invariant. Content below the required tier may not be
# written to a given surface. INSTRUCTION is the agent control plane.
surface_min_tier:
  instruction: trusted   # only TRUSTED content may shape future behaviour
  knowledge: limited
  episodic: untrusted
  scratch: untrusted

# When the min-tier requirement is violated, what to do.
# `quarantine` lets a human promote the content; `deny` rejects it.
on_tier_violation:
  instruction: deny
  knowledge: quarantine
  episodic: allow
  scratch: allow

# Severity-driven decisions from detector findings, evaluated per surface.
# The most restrictive matching rule wins.
severity_decisions:
  instruction:
    critical: deny
    high: deny
    medium: quarantine
    low: allow
  knowledge:
    critical: deny
    high: quarantine
    medium: sanitize
    low: allow
  episodic:
    critical: quarantine
    high: sanitize
    medium: allow
    low: allow
  scratch:
    critical: sanitize
    high: allow
    medium: allow
    low: allow

# Secrets/PII handling: prefer redaction (sanitize) over hard denial so that
# legitimate writes are not lost, except on the control plane.
secrets:
  default: sanitize
  instruction: deny

# Stricter table for *injection-class* findings specifically. A "sanitize"
# outcome cannot neutralise injection *phrasing* (sanitize only strips
# secrets/PII and hidden characters), so adversarial instruction-like text in a
# stored memory is held for human review rather than kept. Anomaly/obfuscation
# findings continue to use `severity_decisions` above. Omit this section to fall
# back to the generic table.
#
# Trade-off: tightening knowledge `medium -> quarantine` can also hold back
# legitimate content that *quotes* injection phrases (e.g. security
# documentation). Relax the relevant cell if that matters for your corpus.
injection_severity_decisions:
  instruction:
    critical: deny
    high: deny
    medium: deny       # any real injection signal on the control plane is denied
    low: quarantine    # even a weak signal on the control plane warrants review
  knowledge:
    critical: deny
    high: quarantine
    medium: quarantine  # held for review (sanitize cannot neutralise phrasing)
    low: allow
  episodic:
    critical: quarantine
    high: quarantine
    medium: allow
    low: allow
  scratch:
    critical: quarantine
    high: allow
    medium: allow
    low: allow
