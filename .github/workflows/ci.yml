name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check & security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,dev]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (type-check)
        run: mypy

      - name: Bandit (static security scan)
        run: bandit -q -r src -c pyproject.toml

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit

      - name: NIST doc is in sync with catalog
        run: |
          python scripts/gen_nist_doc.py
          git diff --exit-code docs/NIST_CONTROL_MAPPING.md \
            || (echo "::error::docs/NIST_CONTROL_MAPPING.md is stale; run 'make docs'" && exit 1)

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,dev]"

      - name: Run tests
        run: pytest -q

  docker:
    name: Build container image
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t mnemosyne-guard:ci .
